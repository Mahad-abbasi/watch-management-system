server.port=8080            

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TimeSphereDB;integratedSecurity=true;encrypt=true;trustServerCertificate=true;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ============================================================
# application.properties — Spring Boot Configuration File
# Yeh file tumhare poore application ki settings define karti hai
# --- SERVER CONFIG ---
